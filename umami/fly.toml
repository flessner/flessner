app = 'flessner-umami'
primary_region = 'ams'

[build]
image = 'docker.umami.is/umami-software/umami:latest'

[env]
DISABLE_TELEMETRY = '1'

[http_service]
internal_port = 3000
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = false
min_machines_running = 1

[[http_service.checks]]
interval = '30s'
timeout = '5s'
grace_period = '60s'
method = 'GET'
path = '/api/heartbeat'

[[vm]]
size = 'shared-cpu-1x'
memory = '512mb'
cpus = 1
memory_mb = 512
